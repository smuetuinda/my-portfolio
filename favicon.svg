<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#1b4332"/>

  <!-- Leaf bow: organic leaf shape replacing the traditional circular key head -->
  <path d="M 10,4 C 16.5,5.5 17,11 14.5,15 C 13,17.5 10,19 10,19
           C 10,19 7,17.5 5.5,15 C 3,11 3.5,5.5 10,4 Z"
        fill="none" stroke="#d8f3dc" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- Central leaf midrib -->
  <line x1="10" y1="5" x2="10" y2="18.5"
        stroke="#d8f3dc" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>

  <!-- Keyhole cutout inside leaf bow -->
  <circle cx="10" cy="12.5" r="2"
          fill="#1b4332" stroke="#d8f3dc" stroke-width="1.1"/>

  <!-- Stem / shaft -->
  <line x1="14.5" y1="14" x2="28" y2="14"
        stroke="#d8f3dc" stroke-width="2" stroke-linecap="round"/>

  <!-- Leaf bud tooth 1 -->
  <path d="M 19.5,14 C 18,15.5 18.5,18.5 20.5,18.5 C 22.5,18.5 23,15.5 21.5,14 Z"
        fill="#40916c" stroke="#d8f3dc" stroke-width="1" stroke-linejoin="round"/>

  <!-- Leaf bud tooth 2 -->
  <path d="M 24,14 C 22.8,15.3 23.2,17.5 25,17.5 C 26.8,17.5 27.2,15.3 26,14 Z"
        fill="#40916c" stroke="#d8f3dc" stroke-width="1" stroke-linejoin="round"/>

  <!-- Stem tip bud -->
  <circle cx="28" cy="14" r="1.4" fill="#52b788"/>
</svg>
